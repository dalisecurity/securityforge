<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient1)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Shape -->
  <path d="M 256 80 L 380 120 L 380 260 Q 380 360 256 420 Q 132 360 132 260 L 132 120 Z" 
        fill="white" opacity="0.95"/>
  
  <!-- Inner Shield with Gradient -->
  <path d="M 256 100 L 360 135 L 360 260 Q 360 345 256 395 Q 152 345 152 260 L 152 135 Z" 
        fill="url(#gradient2)"/>
  
  <!-- Lock Icon -->
  <rect x="230" y="240" width="52" height="60" rx="5" fill="white"/>
  <path d="M 235 240 L 235 215 Q 235 195 256 195 Q 277 195 277 215 L 277 240" 
        stroke="white" stroke-width="8" fill="none"/>
  
  <!-- Checkmark -->
  <path d="M 240 265 L 250 275 L 270 250" 
        stroke="#1e3a8a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Binary Code Pattern (decorative) -->
  <text x="200" y="160" font-family="monospace" font-size="12" fill="white" opacity="0.3">101010</text>
  <text x="280" y="340" font-family="monospace" font-size="12" fill="white" opacity="0.3">110011</text>
</svg>
