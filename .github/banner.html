<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 320px;
    background: #0a0a0b;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute;
    bottom: -100px;
    left: -60px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
  }
  .content {
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .left {
    flex: 1;
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }
  .title .accent {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 18px;
    color: #8b8b94;
    margin-top: 12px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .badges {
    display: flex;
    gap: 16px;
    margin-top: 20px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    color: #a5b4fc;
    font-size: 13px;
    font-weight: 600;
  }
  .badge .num {
    color: #fff;
    font-weight: 700;
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .terminal {
    background: #111113;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 14px;
    min-width: 380px;
  }
  .terminal-header {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ef4444; }
  .dot-y { background: #eab308; }
  .dot-g { background: #22c55e; }
  .line {
    color: #8b8b94;
    line-height: 1.8;
  }
  .prompt { color: #22c55e; }
  .cmd { color: #e4e4e7; }
  .flag { color: #818cf8; }
  .url { color: #eab308; }
  .comment { color: #555; }
  .brand {
    position: absolute;
    bottom: 20px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .brand-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="left">
      <div class="title"><span class="accent">Fray</span></div>
      <div class="subtitle">Open-source WAF security testing toolkit</div>
      <div class="badges">
        <div class="badge"><span class="num">5,500+</span> Payloads</div>
        <div class="badge"><span class="num">25</span> WAF Vendors</div>
        <div class="badge"><span class="num">0</span> Dependencies</div>
      </div>
    </div>
    <div class="right">
      <div class="terminal">
        <div class="terminal-header">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="line"><span class="prompt">$</span> <span class="cmd">pip install</span> <span class="flag">fray</span></div>
        <div class="line"><span class="prompt">$</span> <span class="cmd">fray detect</span> <span class="url">https://example.com</span></div>
        <div class="line"><span class="prompt">$</span> <span class="cmd">fray test</span> <span class="url">https://example.com</span> <span class="flag">-c xss</span></div>
        <div class="line"><span class="comment"># AI-native · MCP · Claude & ChatGPT</span></div>
      </div>
    </div>
  </div>
  <div class="brand">
    <div class="brand-icon">D</div>
    DALI SECURITY
  </div>
</body>
</html>
